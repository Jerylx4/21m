<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeryl genial</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://public.codepenassets.com/css/reset-2.0.min.css">

    <style>
        body, html { 
            margin: 0; padding: 0; overflow: hidden; height: 100%; width: 100%;
            background-color: #1b1b1b; font-family: 'Montserrat', sans-serif; 
        }

        #seccion-gatito { position: relative; width: 100%; height: 100%; z-index: 10; display: block; }
        #seccion-flor { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; background: #050505; z-index: 20; }

        #lienzo_dibujo, #lienzo_mano { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); }
        #lienzo_dibujo { z-index: 2; }
        #lienzo_mano { z-index: 3; pointer-events: none; }
        #video_fondo { display: none; }
        #contenedor_guia { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80vw; max-width: 500px; opacity: 0.25; pointer-events: none; z-index: 1; }
        #contenedor_interfaz { position: absolute; bottom: 20px; right: 20px; z-index: 10; }
        .panel_cristal { display: flex; flex-direction: column; align-items: center; background: rgba(20, 10, 15, 0.85); backdrop-filter: blur(12px); border: 2px solid rgba(236, 72, 153, 0.4); border-radius: 24px; padding: 20px 15px; box-shadow: 0 8px 32px rgba(236, 72, 153, 0.2); color: white; gap: 12px; }
        .boton_color { width: 40px; height: 40px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.5); transition: all 0.3s ease; }
        .boton_color.activo { border: 4px solid white; transform: scale(1.15); box-shadow: 0 0 15px currentColor; }
        .boton_accion { width: 100%; font-size: 10px; font-weight: bold; padding: 8px; border-radius: 12px; transition: opacity 0.2s; }

        .mensaje_flor { position: absolute; top: 50%; left: calc(50vw + 30vmin); transform: translateY(-50%); font-weight: 900; text-transform: uppercase; letter-spacing: -1px; z-index: 10; white-space: nowrap; opacity: 0; transition: opacity 0.7s; font-size: 3.8vmin; color: #ffffff; text-shadow: 0 0 10px rgba(255, 255, 255, 0.8), 0 2px 4px rgba(0,0,0,0.5); }
        .envoltura { position: absolute; top: 0; right: 0; bottom: 0; left: 0; margin: auto; width: 10vmin; height: 10vmin; font-size: 10vmin; transform: rotateX(-45deg); transform-style: preserve-3d; animation: mover-izq 1.5s cubic-bezier(.7,0,.3,1) 1 forwards; }
        @keyframes mover-izq { 0% { transform: rotateX(-45deg) translateX(0); } 100% { transform: rotateX(-45deg) translateX(-20vw); } }
        .flor { width: 10vmin; height: 10vmin; animation: rotar-flor 30s linear infinite; transform-style: preserve-3d; }
        .flor:before { content: ""; display: block; position: absolute; width: 95%; height: 95%; top: 0; right: 0; bottom: 0; left: 0; margin: auto; background: radial-gradient(circle, #4b3621 0%, #8b4513 50%, #cd853f 100%); border-radius: 50%; transform: rotateX(90deg); box-shadow: 0 0 15px rgba(205, 133, 63, 0.5); }
        .petalo { position: absolute; z-index: 20; bottom: 80%; left: -10vmin; transform-style: preserve-3d; transform-origin: bottom; }
        .caja { width: 30vmin; transform-style: preserve-3d; transform-origin: bottom; animation: rotar-caja 12s infinite; }
        .forma { width: 0.5em; height: 0.5em; margin: auto; background: currentColor; box-shadow: 0.5em 0 0 0, 1em 0 0 0, -1em 0 0 0, -0.5em 0 0 0; border-radius: 50%; filter: drop-shadow(0 0 2px rgba(255,215,0,0.3)); }
        @keyframes rotar-caja { 0%, 15%, 100% { transform: rotateX(3.5deg); } 50%, 80% { transform: rotateX(-7deg); } }
        @keyframes rotar-flor { 100% { transform: rotateY(360deg); } }
        #lienzo_galaxia { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 1; background: transparent; transition: opacity 2s; }
        .contenedor { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 100; padding: 3px; background: linear-gradient(90deg, #ffeb3b, #ff9800); border-radius: 0.9em; transition: all 0.4s ease; display: none; } 
        .contenedor .boton { font-size: 1.4em; padding: 0.6em 0.8em; border-radius: 0.5em; border: none; background-color: #000; color: #fff; cursor: pointer; box-shadow: 2px 2px 3px #000000b4; min-width: 160px; font-family: inherit; font-weight: bold; }

        @media (max-width: 480px) {
            .envoltura { width: 18vmin !important; height: 18vmin !important; font-size: 12vmin !important; animation: mover-arriba-movil 1.2s cubic-bezier(.7,0,.3,1) 1 forwards !important; left: 50% !important; top: 40% !important; }
            @keyframes mover-arriba-movil { 0% { transform: rotateX(-45deg) translateY(0) translateX(-50%); } 100% { transform: rotateX(-45deg) translateY(-15vh) translateX(-50%); } }
            .mensaje_flor { position: fixed !important; bottom: 15vh !important; left: 50% !important; transform: translateX(-50%) !important; white-space: normal !important; font-size: 5.5vmin !important; text-align: center !important; max-width: 85vw !important; z-index: 100 !important; }
        }
    </style>
</head>
<body>

    <div id="seccion-gatito">
        <video id="video_fondo" autoplay playsinline></video>
        <div id="contenedor_guia">
            <svg viewBox="0 0 500 400" width="100%" height="100%">
                <ellipse cx="250" cy="220" rx="180" ry="130" fill="none" stroke="white" stroke-width="8" stroke-dasharray="15,10"/>
                <path d="M 110 140 L 90 30 L 200 100" fill="none" stroke="white" stroke-width="8" stroke-dasharray="15,10"/>
                <path d="M 390 140 L 410 30 L 300 100" fill="none" stroke="white" stroke-width="8" stroke-dasharray="15,10"/>
                <ellipse cx="170" cy="230" rx="15" ry="25" fill="none" stroke="white" stroke-width="8"/><ellipse cx="330" cy="230" rx="15" ry="25" fill="none" stroke="white" stroke-width="8"/><ellipse cx="250" cy="260" rx="20" ry="15" fill="none" stroke="white" stroke-width="8"/>
                <line x1="20" y1="200" x2="100" y2="210" stroke="white" stroke-width="8" stroke-dasharray="10,5"/><line x1="10" y1="230" x2="90" y2="230" stroke="white" stroke-width="8" stroke-dasharray="10,5"/><line x1="20" y1="260" x2="100" y2="250" stroke="white" stroke-width="8" stroke-dasharray="10,5"/>
                <line x1="480" y1="200" x2="400" y2="210" stroke="white" stroke-width="8" stroke-dasharray="10,5"/><line x1="490" y1="230" x2="410" y2="230" stroke="white" stroke-width="8" stroke-dasharray="10,5"/><line x1="480" y1="260" x2="400" y2="250" stroke="white" stroke-width="8" stroke-dasharray="10,5"/>
                <circle cx="360" cy="110" r="15" fill="none" stroke="white" stroke-width="8"/><path d="M 350 100 L 310 70 L 320 130 Z" fill="none" stroke="white" stroke-width="8"/><path d="M 370 100 L 410 70 L 400 130 Z" fill="none" stroke="white" stroke-width="8"/>
            </svg>
        </div>
        <canvas id="lienzo_dibujo"></canvas>
        <canvas id="lienzo_mano"></canvas>
        <div id="contenedor_interfaz">
            <div class="panel_cristal">
                <h1 class="text-[10px] uppercase text-pink-400 font-bold" id="texto_estado">Listos</h1>
                <div class="flex flex-col gap-2">
                    <button id="btn-rosa" class="boton_color" style="background-color: #EC4899;" onclick="establecerColor('#EC4899', 'btn-rosa')"></button>
                    <button id="btn-blanco" class="boton_color activo" style="background-color: #FFFFFF;" onclick="establecerColor('#FFFFFF', 'btn-blanco')"></button>
                    <button id="btn-negro" class="boton_color" style="background-color: #000000;" onclick="establecerColor('#000000', 'btn-negro')"></button>
                    <button id="btn-amarillo" class="boton_color" style="background-color: #FBBF24;" onclick="establecerColor('#FBBF24', 'btn-amarillo')"></button>
                </div>
                <div class="flex flex-col gap-2 w-full mt-2">
                    <button class="boton_accion bg-red-500/80" onclick="limpiarLienzo()">BORRAR</button>
                    <button class="boton_accion bg-green-500/80" onclick="guardarLienzo()">GUARDAR</button>
                </div>
                <div class="text-[9px] text-pink-200 text-center leading-tight mt-1">
                    1: Dibujar<br>2: Rosa<br>3: Blanco<br>4: Negro<br>5: Amarillo
                </div>
            </div>
        </div>
    </div>

    <div id="seccion-flor">
        <div id="contenido_principal">
            <div class="contenedor" id="contenedor_btn_inicio">
                <button id="btn_inicio" class="boton"></button>
            </div>
            <audio id="musica_fondo" src="musica/Juanes - Es Por Ti (Official Music Video).mp3" preload="auto"></audio>
            <canvas id="lienzo_galaxia" style="display:none; opacity:0; will-change:opacity;"></canvas>
            <div class="envoltura" style="display:none;"><div class="flor"></div></div>
            <div class="mensaje_flor" style="display:none;"></div>
        </div>
    </div>

    <script>
        const elementoVideo = document.getElementById('video_fondo');
        const lienzoDibujo = document.getElementById('lienzo_dibujo');
        const ctxDibujo = lienzoDibujo.getContext('2d');
        const lienzoMano = document.getElementById('lienzo_mano');
        const ctxMano = lienzoMano.getContext('2d');
        const textoEstado = document.getElementById('texto_estado');

        function redimensionarLienzo() {
            lienzoDibujo.width = window.innerWidth; lienzoDibujo.height = window.innerHeight;
            lienzoMano.width = window.innerWidth; lienzoMano.height = window.innerHeight;
        }
        window.addEventListener('resize', redimensionarLienzo);
        redimensionarLienzo();

        let colorActual = '#FFFFFF';
        let estaDibujando = [false, false];
        let puntosPrevios = [{x: 0, y: 0}, {x: 0, y: 0}];

        function establecerColor(color, idBoton) {
            colorActual = color;
            document.querySelectorAll('.boton_color').forEach(btn => btn.classList.remove('activo'));
            const botonActivo = document.getElementById(idBoton);
            if(botonActivo) botonActivo.classList.add('activo');
        }

        function limpiarLienzo() { 
            ctxDibujo.clearRect(0, 0, lienzoDibujo.width, lienzoDibujo.height); 
            textoEstado.innerText = "✨ Lienzo Limpio";
            setTimeout(() => textoEstado.innerText = "Listos 🎀", 1500);
        }

        function guardarLienzo() {
            const lienzoTempGuardado = document.createElement('canvas');
            const ctxTempGuardado = lienzoTempGuardado.getContext('2d');
            lienzoTempGuardado.width = lienzoDibujo.width; lienzoTempGuardado.height = lienzoDibujo.height;
            ctxTempGuardado.fillStyle = '#111111'; ctxTempGuardado.fillRect(0, 0, lienzoTempGuardado.width, lienzoTempGuardado.height);
            ctxTempGuardado.save(); ctxTempGuardado.translate(lienzoTempGuardado.width, 0); ctxTempGuardado.scale(-1, 1);
            ctxTempGuardado.drawImage(lienzoDibujo, 0, 0); ctxTempGuardado.restore();
            
            const enlace = document.createElement('a');
            enlace.download = `mi-obra-kitty-${Date.now()}.png`;
            enlace.href = lienzoTempGuardado.toDataURL('image/png');
            enlace.click();

            document.getElementById('seccion-gatito').style.display = 'none';
            document.getElementById('seccion-flor').style.display = 'block';
            
            const evento = new Event('DOMContentLoaded');
            window.dispatchEvent(evento);
        }

        function alObtenerResultados(resultados) {
            ctxMano.clearRect(0, 0, lienzoMano.width, lienzoMano.height);
            if (resultados.multiHandLandmarks) {
                for (let i = 0; i < resultados.multiHandLandmarks.length; i++) {
                    const mano = resultados.multiHandLandmarks[i];
                    drawConnectors(ctxMano, mano, HAND_CONNECTIONS, { color: '#ec4899', lineWidth: 3 });
                    drawLandmarks(ctxMano, mano, { color: '#ffffff', lineWidth: 1, radius: 3 });

                    const indiceArriba = mano[8].y < mano[6].y;
                    const medioArriba = mano[12].y < mano[10].y;
                    const anularArriba = mano[16].y < mano[14].y;
                    const meniqueArriba = mano[20].y < mano[18].y;
                    const esManoDerecha = resultados.multiHandedness[i].label === 'Right';
                    const pulgarArriba = esManoDerecha ? (mano[4].x < mano[3].x) : (mano[4].x > mano[3].x);

                    const conteoDedos = [indiceArriba, medioArriba, anularArriba, meniqueArriba, pulgarArriba].filter(Boolean).length;

                    if (!estaDibujando[i]) {
                        if (conteoDedos === 2 && indiceArriba && medioArriba && !anularArriba && !meniqueArriba) establecerColor('#EC4899', 'btn-rosa');
                        else if (conteoDedos === 3 && indiceArriba && medioArriba && anularArriba && !meniqueArriba) establecerColor('#FFFFFF', 'btn-blanco');
                        else if (conteoDedos === 4 && indiceArriba && medioArriba && anularArriba && meniqueArriba && !pulgarArriba) establecerColor('#000000', 'btn-negro');
                        else if (conteoDedos === 5) establecerColor('#FBBF24', 'btn-amarillo');
                    }

                    if (conteoDedos === 1 && indiceArriba) {
                        const px = mano[8].x * lienzoDibujo.width;
                        const py = mano[8].y * lienzoDibujo.height;
                        if (!estaDibujando[i]) { estaDibujando[i] = true; puntosPrevios[i] = { x: px, y: py }; }
                        else {
                            ctxDibujo.beginPath(); ctxDibujo.moveTo(puntosPrevios[i].x, puntosPrevios[i].y);
                            ctxDibujo.lineTo(px, py); ctxDibujo.lineCap = 'round'; ctxDibujo.lineWidth = 14;
                            ctxDibujo.strokeStyle = colorActual; ctxDibujo.stroke();
                            puntosPrevios[i] = { x: px, y: py };
                        }
                    } else { estaDibujando[i] = false; }
                }
            }
        }

        const manos = new Hands({locateFile: (archivo) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${archivo}`});
        manos.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.8, minTrackingConfidence: 0.8 });
        manos.onResults(alObtenerResultados);
        new Camera(elementoVideo, { onFrame: async () => { await manos.send({image: elementoVideo}); }, width: 1280, height: 720 }).start();
    </script>

    <script>
    window.addEventListener('DOMContentLoaded', function() {
        if (document.getElementById('seccion-flor').style.display !== 'block') {
            return; 
        }

        var documento = document;
        var flor = documento.querySelector('.flor');
        var maximoPartes = 20;
        var maximoPetalos = 8; 
        var pasoFuentePartes = 25 / maximoPartes;

        function crearFlor() {
            var angulo = 360 / maximoPetalos;
            for (var i = 0; i < maximoPetalos; i++) {
                var petalo = crearPetalo();
                var anguloActual = angulo * i + 'deg';
                var transformacion = 'transform: rotateY(' + anguloActual + ') rotateX(-25deg) translateZ(9vmin)';
                petalo.setAttribute('style', transformacion);
                flor.appendChild(petalo);
            }
        }

        function crearPetalo() {
            var caja = crearCaja(null, 0);
            var petalo = documento.createElement('div');
            petalo.classList.add('petalo');
            for (var i = 1; i <= maximoPartes; i++) { caja = crearCaja(caja, i); }
            petalo.appendChild(caja);
            return petalo;
        }

        function crearCaja(cajaAnterior, pos) {
            var tamanoFuente = pasoFuentePartes * (maximoPartes - pos) + 'vmin';
            var mitad = maximoPartes / 2;
            var brillo = '55'; 
            if (pos < mitad + 1) { tamanoFuente = pasoFuentePartes * pos + 'vmin'; } 
            else { brillo = 20 + 35 / mitad * (maximoPartes - pos); }
            var color = 'hsl(' + (50 + (15 * pos / maximoPartes)) + ', 95%, ' + brillo + '%)';
            var nuevaForma = documento.createElement('div'); nuevaForma.classList.add('forma');
            var nuevaCaja = documento.createElement('div'); nuevaCaja.classList.add('caja');
            nuevaCaja.setAttribute('style', 'color: ' + color + '; font-size: ' + tamanoFuente);
            if (cajaAnterior) nuevaCaja.appendChild(cajaAnterior); nuevaCaja.appendChild(nuevaForma);
            return nuevaCaja;
        }

        crearFlor();

        const mensajes = ['Incluso en la oscuridad,', 'puedes encontrar la fuerza', 'para florecer de nuevo.', 'Tu luz interior', 'es inquebrantable.', 'Sigue adelante <3'];
        var envoltura = document.querySelector('.envoltura');
        var contenedorMensaje = document.querySelector('.mensaje_flor');
        var puntosGalaxia = []; 

        var esMovil = window.innerWidth <= 600;
        document.getElementById('contenedor_btn_inicio').style.display = 'none';
        envoltura.style.display = '';
        var musica = document.getElementById('musica_fondo');
        if (musica) { musica.play().catch(() => {}); }

        setTimeout(function() {
            var lienzoGalaxia = document.getElementById('lienzo_galaxia');
            lienzoGalaxia.style.display = '';
            var ctxGalaxia = lienzoGalaxia.getContext('2d');
            function redimensionarGalaxia() { lienzoGalaxia.width = window.innerWidth; lienzoGalaxia.height = window.innerHeight; }
            redimensionarGalaxia(); window.addEventListener('resize', redimensionarGalaxia);
            var numPuntos = esMovil ? 40 : 80;
            for(let i=0; i<numPuntos; i++){
                let angulo = Math.random() * 2 * Math.PI;
                let radio = Math.random() * (Math.max(window.innerWidth, window.innerHeight) / 2);
                puntosGalaxia.push({x: window.innerWidth/2 + Math.cos(angulo)*radio, y: window.innerHeight/2 + Math.sin(angulo)*radio, r: Math.random()*1.8+0.3, dx: (Math.random()-0.5)*0.6, dy: (Math.random()-0.5)*0.6, hue: 45+Math.random()*15, alpha: 0.4+Math.random()*0.5});
            }
            function animarGalaxia() {
                ctxGalaxia.clearRect(0, 0, lienzoGalaxia.width, lienzoGalaxia.height);
                puntosGalaxia.forEach(punto => {
                    ctxGalaxia.beginPath(); ctxGalaxia.arc(punto.x, punto.y, punto.r, 0, 7); ctxGalaxia.fillStyle = `hsla(${punto.hue}, 80%, 70%, ${punto.alpha})`; ctxGalaxia.fill();
                    punto.x += punto.dx; punto.y += punto.dy;
                    if (punto.x < 0) punto.x = lienzoGalaxia.width; if (punto.x > lienzoGalaxia.width) punto.x = 0;
                    if (punto.y < 0) punto.y = lienzoGalaxia.height; if (punto.y > lienzoGalaxia.height) punto.y = 0;
                });
                requestAnimationFrame(animarGalaxia);
            }
            lienzoGalaxia.style.opacity = '1'; animarGalaxia();
        }, 1800);

        contenedorMensaje.style.display = '';
        setTimeout(() => { contenedorMensaje.style.opacity = 1; }, 100);
        let indiceMensaje = 0;
        function mostrarSiguiente() {
            if (indiceMensaje < mensajes.length) {
                let texto = mensajes[indiceMensaje]; contenedorMensaje.textContent = ''; let i = 0;
                function escribir() {
                    if (i < texto.length) { contenedorMensaje.textContent += texto.charAt(i); i++; setTimeout(escribir, 90); }
                    else { indiceMensaje++; setTimeout(mostrarSiguiente, 1200); }
                }
                escribir();
            }
        }
        mostrarSiguiente();
    });
    </script>
</body>
</html>
